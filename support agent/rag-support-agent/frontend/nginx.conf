server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Serve React app — send all non-asset routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Docker's embedded DNS — re-resolve service names dynamically so a
    # restarted backend container is picked up without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy /api/* to the FastAPI backend container.
    # Using a variable forces nginx to use the resolver on every request.
    location /api/ {
        set $upstream "api";
        proxy_pass http://$upstream:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE support (used by /api/documents/{id}/status)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
